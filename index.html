<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Customer Defect Resolution Day — Live Progress</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
 
:root{
  --red:    #D94F4E;
  --red2:   #f07060;
  --red-dk: #9e2e2d;
  --gold:   #E8900A;
  --gold-lt:#FEF3DC;
  --indigo: #3D3580;
  --ind-lt: #EEEDF8;
  --ind-md: #6C63C0;
  --sage:   #3D6B52;
  --sage-lt:#E4F0EA;
  --bg:     #F2F0F7;
  --surface:#FFFFFF;
  --border: #DCD9EE;
  --text:   #1C1A38;
  --muted:  #8580A8;
  --display:'Bricolage Grotesque',sans-serif;
  --mono:   'Space Mono',monospace;
}
 
body{
  background:var(--bg);color:var(--text);
  font-family:var(--mono);min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:3rem 1rem 4rem;
  position:relative;overflow-x:hidden;
}
body::before{
  content:'';position:fixed;top:-120px;right:-120px;
  width:500px;height:500px;
  border-radius:60% 40% 55% 45%/45% 55% 40% 60%;
  background:radial-gradient(circle,rgba(108,99,192,.12) 0%,transparent 70%);
  pointer-events:none;z-index:0;
}
body::after{
  content:'';position:fixed;bottom:-100px;left:-100px;
  width:400px;height:400px;
  border-radius:45% 55% 60% 40%/55% 40% 60% 45%;
  background:radial-gradient(circle,rgba(217,79,78,.10) 0%,transparent 70%);
  pointer-events:none;z-index:0;
}
 
.container{
  position:relative;z-index:1;
  width:100%;max-width:860px;
}
 
/* ── HEADER ── */
.header{
  text-align:center;
  margin-bottom:2.5rem;
}
.event-tag{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--ind-lt);border:1px solid var(--border);
  border-radius:4px;padding:4px 14px;
  font-size:10px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--ind-md);margin-bottom:1rem;
}
.pulse{
  width:6px;height:6px;border-radius:50%;
  background:var(--red);
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.7);}}
 
h1{
  font-family:var(--display);
  font-size:clamp(36px,6vw,68px);
  font-weight:800;line-height:.95;
  letter-spacing:-.02em;
  color:var(--indigo);
  margin-bottom:.5rem;
}
h1 em{color:var(--red);font-style:normal;}
.tagline{
  font-size:12px;color:var(--muted);
  letter-spacing:.06em;text-transform:uppercase;
}
 
/* ── MAIN LAYOUT ── */
.layout{
  display:grid;
  grid-template-columns:160px 1fr;
  gap:40px;
  align-items:start;
}
 
/* ── THERMOMETER ── */
.thermo-col{
  display:flex;flex-direction:column;
  align-items:center;gap:0;
  position:sticky;top:40px;
}
 
.thermo-svg-wrap{
  /* extra top space for overflow drips */
  overflow:visible;
}
 
.thermo-readout{
  text-align:center;
  margin-top:12px;
}
.big-num{
  font-family:var(--display);
  font-size:60px;font-weight:800;line-height:1;
  color:var(--red);
  transition:color .4s;
}
.big-num.zero{color:var(--muted);}
.big-num.over{color:var(--red);}
 
.denom{font-size:11px;color:var(--muted);letter-spacing:.05em;margin-top:2px;}
.pct-label{
  font-size:11px;color:var(--muted);
  margin-top:3px;
  transition:color .4s;
}
.pct-label.over{color:var(--red);font-weight:700;}
 
/* ── RIGHT COLUMN ── */
.right-col{display:flex;flex-direction:column;gap:20px;}
 
/* STAT CARDS */
.stat-row{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}
.card{
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:10px;
  padding:14px 16px;
  position:relative;
  overflow:hidden;
}
.card::after{
  content:'';position:absolute;
  top:0;left:0;right:0;height:3px;
  background:var(--c,var(--border));
}
.card.c-indigo{--c:var(--indigo);}
.card.c-red{--c:var(--red);}
.card.c-gold{--c:var(--gold);}
.card.c-sage{--c:var(--sage);}
 
.card-label{
  font-size:9px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted);margin-bottom:6px;
}
.card-value{
  font-family:var(--display);
  font-size:34px;font-weight:800;line-height:1;
  color:var(--indigo);
}
.card-value.red{color:var(--red);}
.card-value.gold{color:var(--gold);}
.card-value.sage{color:var(--sage);}
.card-sub{font-size:10px;color:var(--muted);margin-top:4px;line-height:1.4;}
 
/* RULE BOX */
.rule-box{
  background:var(--ind-lt);
  border:1px solid var(--border);
  border-left:3px solid var(--ind-md);
  border-radius:8px;
  padding:12px 16px;
  font-size:12px;color:var(--muted);line-height:1.6;
}
.rule-box strong{color:var(--text);}
.pill{
  display:inline-block;
  background:var(--surface);border:1px solid var(--border);
  border-radius:3px;padding:1px 6px;
  font-size:11px;color:var(--ind-md);
}
 
/* SECTION TITLE */
.sec-title{
  font-size:9px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--muted);margin-bottom:10px;
  display:flex;align-items:center;gap:10px;
}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border);}
 
/* STATUS CHIPS */
.chips{
  display:flex;flex-wrap:wrap;gap:8px;
}
.chip{
  display:inline-flex;align-items:center;gap:6px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:4px 12px;
  font-size:11px;color:var(--muted);
}
.chip.q{
  background:var(--sage-lt);border-color:rgba(61,107,82,.25);
  color:var(--sage);
}
.chip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.chip-cnt{font-weight:700;color:var(--text);margin-left:2px;}
 
/* CELEBRATE */
.celebrate{
  display:none;
  background:linear-gradient(135deg,rgba(217,79,78,.1),rgba(61,53,128,.08));
  border:2px solid rgba(217,79,78,.35);
  border-radius:12px;padding:16px 20px;
  text-align:center;
  font-family:var(--display);font-size:20px;font-weight:800;
  color:var(--indigo);
  animation:glow 2s ease-in-out infinite;
  margin-bottom:20px;
  letter-spacing:-.01em;
}
@keyframes glow{
  0%,100%{box-shadow:0 0 20px rgba(217,79,78,.15);}
  50%{box-shadow:0 0 40px rgba(217,79,78,.3);}
}
 
/* FOOTER */
.footer{
  margin-top:2rem;text-align:center;
  font-size:10px;color:var(--muted);
  letter-spacing:.05em;
}
 
@media(max-width:640px){
  .layout{grid-template-columns:1fr;}
  .thermo-col{flex-direction:row;justify-content:center;gap:24px;position:static;}
  .stat-row{grid-template-columns:repeat(3,1fr);}
}
 
/* ── INPUT CONTROL ── */
.input-bar{
  display:flex;align-items:center;justify-content:center;
  gap:12px;margin-bottom:2rem;
  flex-wrap:wrap;
}
.input-bar label{
  font-size:11px;letter-spacing:.08em;text-transform:uppercase;
  color:var(--muted);
}
.num-input{
  width:90px;
  font-family:var(--display);font-size:28px;font-weight:800;
  color:var(--indigo);
  background:var(--surface);
  border:2px solid var(--border);
  border-radius:8px;
  padding:6px 12px;
  text-align:center;
  outline:none;
  transition:border-color .2s;
  -moz-appearance:textfield;
}
.num-input::-webkit-outer-spin-button,
.num-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
.num-input:focus{border-color:var(--indigo);}
.update-btn{
  font-family:var(--mono);font-size:11px;font-weight:700;
  letter-spacing:.06em;text-transform:uppercase;
  background:var(--indigo);color:#fff;
  border:none;border-radius:8px;
  padding:10px 20px;cursor:pointer;
  transition:background .2s,transform .1s;
}
.update-btn:hover{background:var(--ind-md);}
.update-btn:active{transform:scale(.97);}
.of-label{
  font-size:13px;color:var(--muted);
}
</style>
</head>
<body>
 
<div class="container">
 
  <div class="header">
    <div class="event-tag"><span class="pulse"></span>May 19, 2026 · Engineering Event</div>
    <h1>Customer Defect<br><em>Resolution Day</em></h1>
    <p class="tagline">Team goal: 40 defects · qualifying so far</p>
  </div>
 
  <div class="input-bar">
    <label>Current Count</label>
    <input type="number" class="num-input" id="cur-input" value="0" min="0" max="999"/>
    <span class="of-label">/ 40</span>
    <button class="update-btn" onclick="updateCount()">Update ↑</button>
  </div>
  <div id="mot-msg" style="text-align:center;font-size:11px;color:var(--muted);margin-top:10px;letter-spacing:.04em;font-family:var(--mono);"></div>
 
  <div class="celebrate" id="celebrate"></div>
 
  <div class="layout">
 
    <!-- THERMOMETER -->
    <div class="thermo-col">
      <div class="thermo-svg-wrap" id="thermo-svg"></div>
      <div class="thermo-readout">
        <div class="big-num" id="big-num">0</div>
        <div class="denom" id="denom">/ 40</div>
        <div class="pct-label" id="pct-label">0%</div>
      </div>
    </div>
 
    <!-- RIGHT -->
    <div class="right-col" id="right-col">
      <!-- rendered by JS -->
    </div>
 
  </div>
 
  <div class="footer">Customer Defect Resolution Day · May 19, 2026 · Firstup Engineering</div>
 
</div>
 
<script>
let CURRENT = 0;
const TARGET  = 40;
 
const STATUS_COUNTS = {
  // Optional: update these to show the status breakdown
  // 'Ready for Test': 12,
  // 'Testing': 5,
  // 'Done': 8,
  // 'Backlog': 6,
  // 'Assigned': 3,
};
 
const QUALIFYING = new Set([
  'Ready for Test','Testing','Testing - PreProd',
  'Ready for Release','In Review','Acceptance',
  'Done','Closed','Resolved'
]);
 
const SCOL = {
  'Awaiting Triage':'#9ca3af','Backlog':'#c0b8d8','Assigned':'#60a5fa',
  'In Development':'#f59e0b','In Review':'#a78bfa',
  'Ready for Test':'#22c55e','Testing':'#16a34a','Testing - PreProd':'#15803d',
  'Acceptance':'#06b6d4','Ready for Release':'#3b82f6',
  'Done':'#3D6B52','Closed':'#2d5240','Resolved':'#1e3b2d',
};
 
// ── Thermometer SVG with overflow support ────────────────────────────────────
function buildThermo(cur, tgt) {
  const pct      = cur / tgt;
  const over     = pct > 1;
  const tubeW    = 32, tubeH = 260, bulbR = 24;
  const overPad  = 70; // space above tube for overflow
  const tx       = 24;
  const ty       = overPad;
  const tb       = ty + tubeH;
  const bx       = tx + tubeW / 2;
  const by       = tb + bulbR;
  const svgH     = by + bulbR + 8;
 
  // Color: red normally, gold when over target
  const fillColor = '#D94F4E';  // always red
  const glowColor = 'rgba(217,79,78,.35)';
 
  // Fill geometry
  const baseFill  = Math.min(pct, 1) * tubeH;
  const fillY     = tb - baseFill;
  const overAmt   = over ? Math.min(pct - 1, 0.6) : 0;
  const overH     = overAmt * tubeH * 1.1;
 
  // Tick marks — extend above target when over
  const tickMax = over ? Math.ceil(cur / 10) * 10 : tgt;
  let ticks = '';
  for (let v = 0; v <= tickMax; v += 10) {
    const y      = tb - (v / tgt) * tubeH;
    const isGoal = v === tgt;
    const isOver = v > tgt;
    if (y < ty - 10) continue;
    ticks += `
      <line x1="${tx-8}" y1="${y}" x2="${tx+tubeW+8}" y2="${y}"
        stroke="${isGoal ? '#E8900A' : isOver ? '#f59e0b' : '#DCD9EE'}"
        stroke-width="${isGoal ? 2 : 1}"
        stroke-dasharray="${isOver ? '4,3' : 'none'}"/>
      <text x="${tx+tubeW+13}" y="${y+4}"
        font-family="Space Mono,monospace" font-size="9"
        font-weight="${isGoal || isOver ? '700' : '400'}"
        fill="${isGoal ? '#E8900A' : isOver ? '#f59e0b' : '#8580A8'}">${v}</text>`;
  }
 
  // Overflow: pool + column + drips
  let overflow = '';
  if (over) {
    // Column above tube
    overflow += `<rect x="${tx+2}" y="${ty - overH}" width="${tubeW-4}" height="${overH + 4}"
                   fill="${fillColor}" opacity=".9"/>`;
    // Spreading pool
    overflow += `<ellipse cx="${bx}" cy="${ty - overH * .55}"
                   rx="${tubeW * .45 + overH * .65}" ry="${Math.max(overH * .5, 3)}"
                   fill="${fillColor}" opacity=".82"
                   filter="url(#glow)"/>`;
    // Drips
    const drips = [[5.5,-14,0],[4,-24,5],[3,-32,-4],[2,-38,8]];
    drips.forEach(([r,dy,dx]) => {
      const dropY = ty - overH * .35 + dy;
      if (dropY > 4) {
        overflow += `<ellipse cx="${bx+dx}" cy="${dropY}" rx="${r}" ry="${r*1.35}"
                       fill="${fillColor}" opacity="${.85 - drips.indexOf([r,dy,dx])*.15}"/>`;
      }
    });
    // Splatter dots
    for (let i=0;i<8;i++) {
      const a = (i/8)*Math.PI*2;
      const d = 16 + (i%3)*6;
      const sx = bx + Math.cos(a)*d;
      const sy = ty - overH*.2 + Math.sin(a)*9;
      if (sy > 3) overflow += `<circle cx="${sx}" cy="${sy}" r="${1.5+i%2}" fill="${fillColor}" opacity=".45"/>`;
    }
  }
 
  // "OVER!" star badge
  const badge = over ? `
    <g transform="translate(${tx+tubeW+30},${ty - overH*.3 - 2})">
      <polygon points="0,-16 4,-6 15,-6 6.5,1.5 10,13 0,6.5 -10,13 -6.5,1.5 -15,-6 -4,-6"
               fill="#D94F4E"/>
      <text x="0" y="6" font-family="Space Mono,monospace" font-size="7" font-weight="700"
            fill="white" text-anchor="middle">OVER!</text>
    </g>` : '';
 
  // Gold line at goal mark when hit
  const goalLine = pct >= 1 ? `
    <line x1="${tx-12}" y1="${ty}" x2="${tx+tubeW+12}" y2="${ty}"
          stroke="#E8900A" stroke-width="2.5" stroke-linecap="round"
          filter="url(#glow)"/>` : '';
 
  return `<svg viewBox="0 0 ${tx+tubeW+60} ${svgH}" width="90"
               xmlns="http://www.w3.org/2000/svg" overflow="visible">
    <defs>
      <linearGradient id="rg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${fillColor}"/>
        <stop offset="100%" stop-color="${fillColor}" stop-opacity=".7"/>
      </linearGradient>
      <linearGradient id="og" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${fillColor}" stop-opacity=".5"/>
        <stop offset="100%" stop-color="${fillColor}"/>
      </linearGradient>
      <clipPath id="tc">
        <rect x="${tx+1}" y="${ty+1}" width="${tubeW-2}" height="${tubeH-2}" rx="7"/>
        <circle cx="${bx}" cy="${by}" r="${bulbR-2}"/>
      </clipPath>
      <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="5" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
 
    ${ticks}
 
    <!-- Tube shell -->
    <rect x="${tx}" y="${ty}" width="${tubeW}" height="${tubeH}" rx="9"
          fill="#EDE9F8" stroke="#DCD9EE" stroke-width="1.5"/>
    <!-- Bulb shell -->
    <circle cx="${bx}" cy="${by}" r="${bulbR}"
            fill="#EDE9F8" stroke="#DCD9EE" stroke-width="1.5"/>
 
    <!-- Mercury fill (clipped) -->
    <g clip-path="url(#tc)">
      <circle cx="${bx}" cy="${by}" r="${bulbR}" fill="url(#rg)"/>
      <rect x="${tx+1}" y="${fillY}" width="${tubeW-2}"
            height="${Math.max(baseFill + bulbR*.7, 0)}" fill="url(#rg)"/>
    </g>
 
    <!-- Overflow mercury above tube -->
    ${overflow}
 
    <!-- Shine strip -->
    <rect x="${tx+6}" y="${ty+5}" width="5" height="${tubeH-10}" rx="2.5"
          fill="rgba(255,255,255,.45)"/>
 
    <!-- Bulb glow -->
    ${cur > 0 ? `<circle cx="${bx}" cy="${by}" r="${bulbR-5}"
                   fill="${fillColor}" opacity="${over?.55:.3}" filter="url(#glow)"/>` : ''}
 
    <!-- Goal line -->
    ${goalLine}
 
    <!-- Borders on top -->
    <rect x="${tx}" y="${ty}" width="${tubeW}" height="${tubeH}" rx="9"
          fill="none" stroke="#C8C0E0" stroke-width="1"/>
    <circle cx="${bx}" cy="${by}" r="${bulbR}"
            fill="none" stroke="#C8C0E0" stroke-width="1"/>
 
    ${badge}
  </svg>`;
}
 
// ── Render ───────────────────────────────────────────────────────────────────
function render() {
  const cur       = CURRENT;
  const tgt       = TARGET;
  const pct       = Math.round((cur / tgt) * 100);
  const over      = cur > tgt;
  const overAmt   = cur - tgt;
  const remaining = Math.max(tgt - cur, 0);
 
  // Thermometer
  document.getElementById('thermo-svg').innerHTML = buildThermo(cur, tgt);
 
  // Big number
  const numEl = document.getElementById('big-num');
  numEl.textContent = cur;
  numEl.className = 'big-num' + (cur === 0 ? ' zero' : over ? ' over' : '');
 
  document.getElementById('denom').textContent = '/ ' + tgt;
 
  const pctEl = document.getElementById('pct-label');
  pctEl.textContent = pct + '%' + (over ? ' 🔥' : '');
  pctEl.className = 'pct-label' + (over ? ' over' : '');
 
  // Celebrate
  const cel = document.getElementById('celebrate');
  if (cur >= tgt) {
    cel.style.display = 'block';
    cel.textContent = over
      ? '🎉 ' + cur + ' and counting — ' + overAmt + ' beyond the goal. Thank you, team! 🎉'
      : '🎯 Goal reached! ' + cur + ' / ' + tgt + ' — thank you for an incredible day of work! 🎯';
  } else {
    cel.style.display = 'none';
  }
 
  // Stat cards
  const thirdCard = over
    ? `<div class="card c-gold">
         <div class="card-label">Over Goal</div>
         <div class="card-value red">+${overAmt}</div>
         <div class="card-sub">beyond the goal — thank you!</div>
       </div>`
    : `<div class="card c-red">
         <div class="card-label">To Goal</div>
         <div class="card-value red">${remaining}</div>
         <div class="card-sub">to go — every one counts!</div>
       </div>`;
 
  // Status chips
  const hasCounts = Object.keys(STATUS_COUNTS).length > 0;
  const chipsHtml = hasCounts
    ? `<div class="sec-title">Status Breakdown</div>
       <div class="chips">
         ${Object.entries(STATUS_COUNTS).map(([s,n]) => {
           const isQ = QUALIFYING.has(s);
           const col = SCOL[s] || '#9ca3af';
           return `<div class="chip ${isQ?'q':''}">
             <div class="chip-dot" style="background:${col}"></div>
             ${s}<span class="chip-cnt">${n}</span>
             ${isQ ? '✓' : ''}
           </div>`;
         }).join('')}
       </div>`
    : '';
 
  document.getElementById('right-col').innerHTML = `
    <div class="stat-row">
      <div class="card c-indigo">
        <div class="card-label">Team Target</div>
        <div class="card-value">${tgt}</div>
        <div class="card-sub">defects — let's go!</div>
      </div>
      <div class="card c-sage">
        <div class="card-label">Qualifying</div>
        <div class="card-value sage">${cur}</div>
        <div class="card-sub">qualifying so far</div>
      </div>
      ${thirdCard}
    </div>
 
    <div class="rule-box">
      <strong>What counts?</strong> Issues labeled <span class="pill">may19-defects</span>
      in the FE project that reach <strong>Ready for Test</strong>, Testing, Testing&nbsp;-&nbsp;PreProd,
      Acceptance, Ready&nbsp;for&nbsp;Release, Done, or Resolved.
      Backlog, Assigned, and In&nbsp;Development do <em>not</em> count yet.
    </div>
 
    ${chipsHtml}
  `;
}
 
function updateCount() {
  const val = parseInt(document.getElementById('cur-input').value, 10);
  if (!isNaN(val) && val >= 0) {
    CURRENT = val;
    render();
  }
}
 
// Allow Enter key to trigger update
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('cur-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') updateCount();
  });
  // Also update live as you type
  document.getElementById('cur-input').addEventListener('input', () => {
    const val = parseInt(document.getElementById('cur-input').value, 10);
    if (!isNaN(val) && val >= 0) { CURRENT = val; render(); }
  });
});
 
render();
</script>
</body>
</html>
